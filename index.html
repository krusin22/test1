<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบสอบออนไลน์</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; overflow: hidden; }
        
        #start-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box;}
        
        #exam-container { display: none; width: 100vw; height: 100vh; -webkit-overflow-scrolling: touch; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #lock-screen { display: none; background-color: #ffe6e6; color: #cc0000; height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        
        input[type="text"], input[type="password"] { padding: 12px; font-size: 16px; margin-top: 12px; text-align: center; border: 1px solid #ccc; border-radius: 5px; width: 80%; max-width: 300px; box-sizing: border-box; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; margin-top: 18px; background-color: #007bff; color: white; border: none; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 80%; max-width: 300px; }
        button:hover { background-color: #0056b3; }
        .lock-btn { background-color: #cc0000; width: auto; }
        .lock-btn:hover { background-color: #990000; }
        #lock-reason { background-color: #ffcccc; padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px; border: 1px solid #cc0000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>ยินดีต้อนรับสู่การสอบ</h2>
        <p>กรุณากรอกข้อมูลให้ครบถ้วนก่อนเริ่มทำข้อสอบ<br><b>ห้ามสลับแอป ย่อหน้าจอ หรือเปิดสองหน้าจอเด็ดขาด</b></p>
        
        <input type="text" id="student-name" placeholder="ชื่อ - นามสกุล">
        <input type="text" id="student-class" placeholder="ชั้น (เช่น ม.6/1)">
        <input type="text" id="student-no" placeholder="เลขที่">
        
        <button onclick="startExam()">เริ่มทำข้อสอบ</button>
    </div>

    <div id="exam-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdpo0s0cevCb-Exz-kZY_o3GcomSBiWMdvfQHi-tmQdQkDOew/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">
            กำลังโหลด…
        </iframe>
    </div>

    <div id="lock-screen">
        <h2>🔒 ระบบถูกล็อก!</h2>
        <p id="lock-reason">สาเหตุ: ไม่ทราบ</p>
        <p><b>(ระบบได้ส่งแจ้งเตือนนี้ไปยังผู้คุมสอบแล้ว)</b></p>
        <input type="password" id="unlock-password" placeholder="ใส่รหัสเพื่อปลดล็อก">
        <button class="lock-btn" onclick="unlockExam()">ปลดล็อกเพื่อสอบต่อ</button>
    </div>

    <script>
        const ADMIN_PASSWORD = "1234"; 
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1514135467526983690/dC4uOlA1U9IneoIaGQsL3iFhbyjQpBsyVmJ8PaEOM0x451BxmSAB6pQfVGqSUETglWqq"; 
        const RESET_TIME_MS = 4 * 60 * 60 * 1000; // 4 ชั่วโมง (จับเวลาเคลียร์ระบบ)

        const startScreen = document.getElementById('start-screen');
        const examContainer = document.getElementById('exam-container');
        const lockScreen = document.getElementById('lock-screen');
        const reasonText = document.getElementById('lock-reason');
        
        const studentNameInput = document.getElementById('student-name');
        const studentClassInput = document.getElementById('student-class');
        const studentNoInput = document.getElementById('student-no');

        let isExamActive = false;
        
        // แยกระบบมือถือและ PC
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        window.onload = () => {
            checkAndResetStorage();
            loadSavedData();
            document.addEventListener('contextmenu', event => event.preventDefault());

            // ⚠️ ดักจับการรีเฟรชหนี! ถ้าระบบเคยล็อคไว้ ให้เด้งไปหน้าแดงทันที
            if (localStorage.getItem('examLocked') === 'true') {
                const savedReason = localStorage.getItem('lockReason') || "พยายามรีเฟรชหน้าเว็บ หรือ ปิดเปิดใหม่";
                showLockScreenOnly(savedReason);
            }
        };

        // ระบบล้างข้อมูลหากทิ้งเครื่องไว้นานเกิน 4 ชั่วโมง
        function checkAndResetStorage() {
            const lastActive = localStorage.getItem('examLastActive');
            if (lastActive && (Date.now() - parseInt(lastActive)) > RESET_TIME_MS) {
                localStorage.clear();
            }
            updateActiveTime();
        }

        // อัปเดตเวลาล่าสุดทุกครั้งที่มีการขยับ
        function updateActiveTime() {
            localStorage.setItem('examLastActive', Date.now().toString());
        }
        ['click', 'touchstart', 'keydown'].forEach(evt => document.addEventListener(evt, updateActiveTime));

        function loadSavedData() {
            const savedName = localStorage.getItem('examStudentName');
            const savedClass = localStorage.getItem('examStudentClass');
            const savedNo = localStorage.getItem('examStudentNo');

            if (savedName) studentNameInput.value = savedName;
            if (savedClass) studentClassInput.value = savedClass;
            if (savedNo) studentNoInput.value = savedNo;
        }

        function startExam() {
            const studentName = studentNameInput.value.trim();
            const studentClass = studentClassInput.value.trim();
            const studentNo = studentNoInput.value.trim();

            if (!studentName || !studentClass || !studentNo) {
                alert("กรุณากรอกข้อมูลให้ครบทุกช่องก่อนเริ่มสอบครับ");
                return;
            }

            if (window.innerWidth < window.screen.availWidth * 0.85) {
                alert("กรุณาขยายหน้าต่างเบราว์เซอร์ให้เต็มจอก่อนกดเริ่มสอบครับ!");
                return;
            }

            localStorage.setItem('examStudentName', studentName);
            localStorage.setItem('examStudentClass', studentClass);
            localStorage.setItem('examStudentNo', studentNo);

            // แจ้งเตือนเข้า Discord เมื่อเด็กเข้าสอบสำเร็จ (แจ้งแค่ครั้งเดียวต่อ 1 คน)
            if (!localStorage.getItem('examRegisteredAlertSent')) {
                sendRegistrationAlert(studentName, studentClass, studentNo);
                localStorage.setItem('examRegisteredAlertSent', 'true');
            }

            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen().catch(() => {});
            else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
            else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();

            startScreen.style.display = 'none';
            lockScreen.style.display = 'none';
            examContainer.style.display = 'block';

            setTimeout(() => {
                isExamActive = true;
            }, 2000);
        }

        // --- ระบบแจ้งเตือนการลงทะเบียน ---
        function sendRegistrationAlert(name, studentClass, no) {
            if (DISCORD_WEBHOOK_URL === "https://discord.com/api/webhooks/1514135467526983690/dC4uOlA1U9IneoIaGQsL3iFhbyjQpBsyVmJ8PaEOM0x451BxmSAB6pQfVGqSUETglWqq") return;
            
            const timeString = new Date().toLocaleTimeString('th-TH');
            const payload = {
                content: `📝 **เข้าสู่ระบบสอบแล้ว!**\n👤 **ชื่อ:** ${name}\n📍 **ชั้น:** ${studentClass}  |  🔢 **เลขที่:** ${no}\n⏰ **เวลา:** ${timeString}`
            };

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(error => console.error('Error:', error));
        }

        // --- ระบบป้องกัน 1: สลับแท็บ / พับจอ ---
        document.addEventListener("visibilitychange", () => {
            if (!isExamActive) return; 
            if (document.visibilityState === "hidden") {
                triggerLock("สลับแท็บ หรือ ปิดซ่อนหน้าต่าง");
            }
        });

        // --- ระบบป้องกัน 2: แบ่งหน้าจอ (Split Screen Killer) ---
        function checkSplitScreen() {
            if (!isExamActive) return;
            const winWidth = window.outerWidth > 0 ? window.outerWidth : window.innerWidth;
            const screenWidth = window.screen.availWidth;

            if (winWidth < screenWidth * 0.85) {
                triggerLock("แบ่งหน้าจอ หรือย่อหน้าต่างให้เล็กลง");
            }
        }
        window.addEventListener('resize', checkSplitScreen);
        setInterval(checkSplitScreen, 2000); 

        // --- ระบบป้องกัน 3: ออกจากโหมดเต็มจอ (เฉพาะ PC) ---
        const fullscreenEvents = ["fullscreenchange", "webkitfullscreenchange", "msfullscreenchange"];
        fullscreenEvents.forEach(evt => document.addEventListener(evt, () => {
            if (!isExamActive || isMobile) return; 
            setTimeout(() => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                    triggerLock("กดออกจากโหมดเต็มจอ (Fullscreen)");
                }
            }, 500);
        }));

        // --- ระบบป้องกัน 4: คลิกแอปอื่นที่ลอยทับอยู่ (เฉพาะ PC) ---
        window.addEventListener("blur", () => {
            if (!isExamActive || isMobile) return; 
            setTimeout(() => {
                if (document.activeElement && document.activeElement.tagName === 'IFRAME') return; 
                triggerLock("คลิกเมาส์ไปที่แอปพลิเคชันอื่น");
            }, 500); 
        });

        // -----------------------------------------------------------

        function showLockScreenOnly(reason) {
            isExamActive = false;
            examContainer.style.display = 'none';
            startScreen.style.display = 'none';
            lockScreen.style.display = 'flex';
            reasonText.innerText = `สาเหตุที่โดนล็อก: ${reason}`;
        }

        function triggerLock(reason) {
            // บันทึกความผิดฝังลงเครื่อง! กันรีเฟรชหนี
            localStorage.setItem('examLocked', 'true');
            localStorage.setItem('lockReason', reason);
            
            showLockScreenOnly(reason);
            sendDiscordAlert(reason); 
        }

        function sendDiscordAlert(reason) {
            if (DISCORD_WEBHOOK_URL === "วาง_URL_ของ_DISCORD_WEBHOOK_ที่นี่") return;
            
            const studentName = localStorage.getItem('examStudentName') || "-";
            const studentClass = localStorage.getItem('examStudentClass') || "-";
            const studentNo = localStorage.getItem('examStudentNo') || "-";
            const timeString = new Date().toLocaleTimeString('th-TH');

            const payload = {
                content: `🚨 **แจ้งเตือนการทุจริต!**\n👤 **ผู้สอบ:** ${studentName}\n📍 **ชั้น:** ${studentClass}  |  🔢 **เลขที่:** ${studentNo}\n⚠️ **สาเหตุ:** ${reason}\n⏰ **เวลา:** ${timeString}`
            };

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(error => console.error('Error:', error));
        }

        function unlockExam() {
            const pwdInput = document.getElementById('unlock-password').value;
            if (pwdInput === ADMIN_PASSWORD) {
                document.getElementById('unlock-password').value = ''; 
                
                // ล้างความผิดออกจากเครื่อง
                localStorage.removeItem('examLocked');
                localStorage.removeItem('lockReason');
                
                sendUnlockAlert();
                startExam(); 
            } else {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function sendUnlockAlert() {
            if (DISCORD_WEBHOOK_URL === "วาง_URL_ของ_DISCORD_WEBHOOK_ที่นี่") return;
            const studentName = localStorage.getItem('examStudentName') || "-";
            
            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `✅ **ปลดล็อกแล้ว:** อนุญาตให้ **${studentName}** ทำข้อสอบต่อได้`
                })
            }).catch(error => console.error(error));
        }
    </script>

</body>
</html>
